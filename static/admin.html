<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识管理 — DeepSeek 风格</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --primary:        hsl(162, 45%, 32%);
    --primary-light:  hsl(162, 45%, 42%);
    --primary-soft:   hsl(162, 45%, 95%);
    --primary-pale:   hsl(162, 40%, 88%);
    --grad-start:     hsl(162, 58%, 41%);
    --grad-end:       hsl(162, 42%, 26%);
    --bg:             hsl(195, 20%, 96%);
    --bg-alt:         hsl(195, 18%, 93%);
    --card:           hsl(0, 0%, 100%);
    --border:         hsl(195, 15%, 87%);
    --text:           hsl(195, 20%, 14%);
    --text-secondary: hsl(195, 12%, 44%);
    --text-muted:     hsl(195, 10%, 62%);
    --orange:         hsl(24, 95%, 53%);
    --orange-soft:    hsl(24, 95%, 93%);
    --red:            hsl(0, 72%, 52%);
    --radius:         12px;
    --radius-sm:      8px;
    --shadow:         0 1px 3px hsl(195 15% 70%/0.15);
    --transition:     0.2s ease;
  }

  html { font-size: 15px; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); height: 100%; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Layout ===== */
  #app { display: flex; height: 100vh; }

  /* ===== Left Sidebar ===== */
  #sidebar {
    width: 380px; min-width: 320px; background: hsl(195, 22%, 97%);
    display: flex; flex-direction: column; border-right: 1px solid var(--border);
    box-shadow: 1px 0 8px hsl(0 0% 0%/0.03);
    height: 100vh;
  }
  #main {
    flex: 1; display: flex; flex-direction: column; background: var(--card);
    min-width: 0; height: 100vh;
  }
  .sb-header {
    padding: 12px 18px; background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    color: #fff; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .sb-header .logo { font-size: 1.3rem; }
  .sb-header h1 { font-size: 0.95rem; font-weight: 700; }
  .sb-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    padding: 10px 14px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sb-stat {
    text-align: center; padding: 5px 2px; border-radius: 6px; background: var(--bg-alt);
  }
  .sb-stat .val { font-size: 0.95rem; font-weight: 800; color: var(--primary); }
  .sb-stat .lbl { font-size: 0.6rem; color: var(--text-muted); }
  .sb-stat.warn .val { color: var(--orange); }

  .sb-actions { display: flex; gap: 6px; padding: 8px 14px; flex-shrink: 0; }
  .sb-btn {
    flex: 1; padding: 6px 0; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-secondary); font-size: 0.73rem;
    cursor: pointer; text-align: center; text-decoration: none; font-weight: 500;
    transition: var(--transition);
  }
  .sb-btn:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
  .sb-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }

  .sb-docs {
    flex: 1; min-height: 0; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #sidebar { overflow: hidden; }
  .sb-docs::-webkit-scrollbar { width: 4px; }
  .sb-docs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sb-doc-item {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px; margin: 2px 0;
    border-radius: 8px; cursor: pointer; transition: var(--transition); font-size: 0.82rem;
  }
  .sb-doc-item:hover { background: var(--card); box-shadow: var(--shadow); }
  .sb-doc-item.active { background: var(--primary-soft); }
  .sb-doc-item .dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--primary);
  }
  .sb-doc-item .info { flex: 1; min-width: 0; }
  .sb-doc-item .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-doc-item .meta { font-size: 0.68rem; color: var(--text-muted); }
  .sb-doc-item .del {
    opacity: 0; width: 22px; height: 22px; border: none; border-radius: 5px;
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sb-doc-item:hover .del { opacity: 1; }
  .sb-doc-item .del:hover { background: hsl(0,70%,92%); color: var(--red); }

  .sb-footer {
    padding: 8px 14px; border-top: 1px solid var(--border); font-size: 0.68rem;
    color: var(--text-muted); display: flex; justify-content: space-between; flex-shrink: 0;
    background: var(--card);
  }
  .sb-footer span { cursor: pointer; }
  .sb-footer span:hover { color: var(--primary); }

  /* ===== Right Main ===== */
  #main {
    flex: 1; display: flex; flex-direction: column; background: var(--card);
    min-width: 0;
  }
  .main-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .main-header h2 { font-size: 1rem; font-weight: 700; color: var(--primary); }
  .main-header .sub { font-size: 0.75rem; color: var(--text-muted); }
  .main-messages {
    flex: 1; min-height: 0; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px; background: var(--bg-alt);
  }
  .main-messages::-webkit-scrollbar { width: 5px; }
  .main-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

  .msg { display: flex; gap: 10px; max-width: 85%; animation: msgIn 0.25s ease; }
  @keyframes msgIn { from { opacity:0; transform: translateY(8px); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  .msg-avatar {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .msg.user .msg-avatar { background: var(--primary-soft); }
  .msg.assistant .msg-avatar { background: hsl(210,70%,92%); }
  .msg-bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 0.87rem; line-height: 1.6;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble { background: linear-gradient(135deg,var(--grad-start),var(--grad-end)); color:#fff; border-bottom-right-radius:4px; }
  .msg.assistant .msg-bubble { background: var(--card); color: var(--text); border-bottom-left-radius:4px; box-shadow: 0 1px 3px hsl(0 0% 0%/0.04); }

  .msg-sources { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
  .msg-src {
    font-size: 0.68rem; padding: 2px 9px; border-radius: 10px;
    background: var(--primary-soft); color: var(--primary); cursor: pointer; font-weight: 500;
    max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .msg-src:hover { background: var(--primary-pale); }
  .msg-cached { font-size: 0.62rem; color: var(--text-muted); padding: 2px 6px; }

  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: 8px 0 4px; color: var(--primary); }
  .msg-bubble h1 { font-size: 1.1rem; } .msg-bubble h2 { font-size: 1rem; } .msg-bubble h3 { font-size: 0.9rem; }
  .msg-bubble p { margin: 4px 0; }
  .msg-bubble strong { font-weight: 700; }
  .msg-bubble code { background: var(--bg-alt); padding: 1px 5px; border-radius: 3px; font-size: 0.85em; }
  .msg-bubble pre { background: hsl(195,20%,12%); color: hsl(162,30%,85%); padding: 10px 14px; border-radius: 8px; overflow-x: auto; font-size: 0.82em; margin: 6px 0; }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble ul,.msg-bubble ol { padding-left: 18px; margin: 4px 0; }
  .msg-bubble blockquote { border-left: 3px solid var(--primary); padding: 4px 10px; margin: 6px 0; background: var(--primary-soft); border-radius: 0 6px 6px 0; color: var(--text-secondary); }
  .msg-bubble a { color: var(--primary); }

  .typing { display: flex; gap: 5px; padding: 10px 14px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay: 0.15s; }
  .typing span:nth-child(3){ animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{ transform:translateY(0); opacity:0.4; } 30%{ transform:translateY(-7px); opacity:1; } }

  .main-input-area {
    padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
    background: var(--card); display: flex; gap: 10px; align-items: flex-end;
  }
  .main-input {
    flex: 1; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 14px;
    font-size: 0.89rem; font-family: inherit; resize: none; outline: none;
    background: var(--bg); transition: var(--transition);
  }
  .main-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px hsl(162,45%,90%); background: var(--card); }
  .main-send {
    padding: 10px 24px; border: none; border-radius: 12px;
    background: var(--primary); color: #fff; font-size: 0.87rem; font-weight: 600;
    cursor: pointer; transition: var(--transition); flex-shrink: 0;
  }
  .main-send:hover { background: var(--primary-light); }
  .main-send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== Doc Preview Panel (right side overlay) ===== */
  .doc-preview {
    display: none; position: absolute; right: 0; top: 0; bottom: 0; width: 55%;
    background: var(--card); border-left: 1px solid var(--border); z-index: 10;
    flex-direction: column; box-shadow: -4px 0 20px hsl(0 0% 0%/0.08);
  }
  .doc-preview.show { display: flex; }
  .dp-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .dp-header h3 { font-size: 0.95rem; color: var(--primary); }
  .dp-actions { display: flex; gap: 6px; }
  .dp-btn {
    padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text-secondary); font-size: 0.75rem;
    cursor: pointer; transition: var(--transition);
  }
  .dp-btn:hover { background: var(--bg-alt); }
  .dp-btn.danger:hover { background: hsl(0,70%,92%); color: var(--red); }
  .dp-body {
    flex: 1; overflow-y: auto; padding: 16px 18px; font-size: 0.87rem; line-height: 1.7;
  }
  .dp-body h1,.dp-body h2,.dp-body h3 { color: var(--primary); margin: 12px 0 6px; }
  .dp-body h1 { font-size: 1.2rem; } .dp-body h2 { font-size: 1.05rem; } .dp-body h3 { font-size: 0.92rem; }
  .dp-body p { margin: 6px 0; }
  .dp-body strong { font-weight: 700; }
  .dp-body code { background: var(--bg-alt); padding: 1px 5px; border-radius: 3px; font-size: 0.88em; }
  .dp-body pre { background: hsl(195,20%,12%); color: hsl(162,30%,85%); padding: 12px 16px; border-radius: 8px; overflow-x: auto; font-size: 0.83em; margin: 8px 0; }
  .dp-body pre code { background: none; padding: 0; }
  .dp-body ul,.dp-body ol { padding-left: 20px; margin: 6px 0; }
  .dp-body blockquote { border-left: 3px solid var(--primary); padding: 4px 12px; margin: 8px 0; background: var(--primary-soft); border-radius: 0 6px 6px 0; }
  .dp-body a { color: var(--primary); }
  .dp-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .dp-body table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  .dp-body th,.dp-body td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; font-size: 0.82rem; }
  .dp-body th { background: var(--bg-alt); font-weight: 700; }
  .dp-entities { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 0; border-top: 1px solid var(--border); margin-top: 8px; }
  .dp-etag {
    font-size: 0.7rem; padding: 2px 9px; border-radius: 10px;
    background: var(--primary-soft); color: var(--primary); cursor: pointer; font-weight: 600;
  }
  .dp-etag:hover { background: var(--primary-pale); }

  /* Edit mode */
  .edit-field { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.87rem; font-family: inherit; margin-bottom: 8px; }
  .edit-field:focus { outline: none; border-color: var(--primary); }
  .edit-textarea { min-height: 200px; resize: vertical; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    #sidebar { width: 260px; min-width: 200px; }
    .sb-stats { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div id="app">
  <!-- ===== LEFT SIDEBAR ===== -->
  <div id="sidebar">
    <div class="sb-header">
      <span class="logo">🧠</span>
      <h1>知识管理</h1>
    </div>
    <div class="sb-stats">
      <div class="sb-stat"><div class="val" id="sDocs">—</div><div class="lbl">文档</div></div>
      <div class="sb-stat"><div class="val" id="sEntities">—</div><div class="lbl">实体</div></div>
      <div class="sb-stat"><div class="val" id="sRelations">—</div><div class="lbl">关系</div></div>
      <div class="sb-stat warn"><div class="val" id="sDue">—</div><div class="lbl">待复习</div></div>
    </div>
    <div class="sb-actions">
      <a href="/static/graph.html" class="sb-btn">🕸️ 图谱</a>
      <a href="/static/insights.html" class="sb-btn">📊 洞察</a>
      <button class="sb-btn" onclick="refreshSidebar()">🔄</button>
    </div>
    <div class="sb-docs" id="sbDocs">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- ===== RIGHT MAIN ===== -->
  <div id="main">
    <div class="main-header">
      <h2>💬 智能问答</h2>
      <span class="sub">基于知识库 · DeepSeek</span>
    </div>
    <div class="main-messages" id="messages">
      <div class="msg assistant">
        <div class="msg-avatar">🤖</div>
        <div>
          <div class="msg-bubble">你好！我是你的知识助手 👋 试试问我：</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;" id="suggestions">
            <span class="msg-src" onclick="askPreset('最近采集了哪些内容')" style="cursor:pointer;font-size:0.78rem;">📋 最近采集了哪些内容</span>
            <span class="msg-src" onclick="askPreset('介绍一下深度学习与Transformer架构')" style="cursor:pointer;font-size:0.78rem;">🧠 深度学习与Transformer</span>
            <span class="msg-src" onclick="askPreset('飞书是什么')" style="cursor:pointer;font-size:0.78rem;">📱 飞书是什么</span>
            <span class="msg-src" onclick="askPreset('Docker容器化技术是什么')" style="cursor:pointer;font-size:0.78rem;">🐳 Docker容器化技术</span>
            <span class="msg-src" onclick="askPreset('React有哪些状态管理方案')" style="cursor:pointer;font-size:0.78rem;">⚛️ React状态管理方案</span>
            <span class="msg-src" onclick="askPreset('Git版本控制最佳实践')" style="cursor:pointer;font-size:0.78rem;">📦 Git最佳实践</span>
          </div>
        </div>
      </div>
    </div>
    <div class="main-input-area">
      <textarea class="main-input" id="qaInput" rows="1" placeholder="输入问题，Enter 发送，Shift+Enter 换行…" onkeydown="handleKey(event)"></textarea>
      <button class="main-send" id="qaSend" onclick="ask()">发送</button>
    </div>
  </div>

  <!-- ===== Doc Preview Overlay ===== -->
  <div class="doc-preview" id="docPreview">
    <div class="dp-header">
      <h3 id="dpTitle">📄 文档预览</h3>
      <div class="dp-actions">
        <button class="dp-btn" onclick="startEdit()">✏️ 编辑</button>
        <button class="dp-btn danger" onclick="deleteCurrentDoc()">🗑️ 删除</button>
        <button class="dp-btn" onclick="closePreview()">✕ 关闭</button>
      </div>
    </div>
    <div class="dp-body" id="dpBody"></div>
  </div>
</div>

<script>
// ===== State =====
let currentDocId = null;
let currentDocData = null;
let sending = false;

// ===== Init =====
loadSidebar();

function askPreset(q) {
  document.getElementById('qaInput').value = q;
  ask();
}

// ===== Sidebar =====
async function refreshSidebar() { loadSidebar(); }

async function loadSidebar() {
  try {
    const r = await fetch('/api/admin/dashboard');
    const data = await r.json();
    document.getElementById('sDocs').textContent = data.stats.documents;
    document.getElementById('sEntities').textContent = data.stats.entities;
    document.getElementById('sRelations').textContent = data.stats.relations;
    document.getElementById('sDue').textContent = data.due_reviews.count;

    // Use dashboard's recent_docs (lightweight, already in response)
    const docs = data.recent_docs || [];
    const container = document.getElementById('sbDocs');
    if (!docs.length) {
      container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">暂无文档</div>';
      return;
    }
    container.innerHTML = docs.map(d => {
      const emoji = {url:'🔗',manual:'✍️',feishu_doc:'📑',feishu_note:'📝',feishu_file:'📎',rss:'📡',obsidian:'💎',file:'📁'}[d.source_type] || '📄';
      return `<div class="sb-doc-item" onclick="previewDoc('${d.id}')">
        <span class="dot"></span>
        <div class="info"><div class="title">${esc(d.title)}</div><div class="meta">${emoji} ${d.source_type} · ${d.collected_at?.slice(0,10)||''}</div></div>
        <button class="del" onclick="event.stopPropagation();deleteDoc('${d.id}')" title="删除">✕</button>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('sbDocs').innerHTML = '<div style="text-align:center;padding:20px;color:var(--red);">加载失败</div>';
  }
}

async function previewDoc(docId) {
  currentDocId = docId;
  document.getElementById('docPreview').classList.add('show');
  document.getElementById('dpBody').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const r = await fetch(`/api/admin/document/${docId}`);
    const doc = await r.json();
    currentDocData = doc;
    document.getElementById('dpTitle').textContent = '📄 ' + doc.title;
    let html = renderMarkdown(doc.content);
    if (doc.entities && doc.entities.length) {
      html += '<div class="dp-entities">' + doc.entities.map(e => `<span class="dp-etag">🔖 ${esc(e.name)}</span>`).join('') + '</div>';
    }
    document.getElementById('dpBody').innerHTML = html;
  } catch(e) {
    document.getElementById('dpBody').innerHTML = '<div style="color:var(--red);text-align:center;padding:20px;">⚠️ 加载失败</div>';
  }
}

function closePreview() {
  document.getElementById('docPreview').classList.remove('show');
  currentDocId = null;
  currentDocData = null;
}

// ===== Q&A Chat =====
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
}
document.getElementById('qaInput').addEventListener('input', function(){
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120)+'px';
});

async function ask() {
  if (sending) return;
  const input = document.getElementById('qaInput');
  const q = input.value.trim();
  if (!q) return;
  sending = true;
  const btn = document.getElementById('qaSend');
  btn.disabled = true; btn.textContent = '思考中…';
  input.value = ''; input.style.height = 'auto';

  appendMsg('user', q);
  const typingEl = appendTyping();

  try {
    const r = await fetch('/api/qa/ask', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question: q, top_k: 20}),
    });
    const data = await r.json();
    typingEl.remove();
    appendMsg('assistant', data.answer, data.sources, data.cached);
  } catch(e) {
    typingEl.remove();
    appendMsg('assistant', '⚠️ 问答服务暂不可用: ' + e.message);
  } finally {
    sending = false; btn.disabled = false; btn.textContent = '发送'; input.focus();
  }
}

function appendMsg(role, text, sources, cached) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'user') {
    el.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${esc(text)}</div>`;
  } else {
    let srcs = '';
    if (sources && sources.length) {
      srcs = '<div class="msg-sources">' +
        (cached ? '<span class="msg-cached">⚡缓存</span>' : '') +
        sources.map((s,i) => `<span class="msg-src" onclick="askPreset('${esc(s.title||'')}')" title="点击追问: ${esc(s.title||'')}">📄 ${esc(s.title||'来源'+(i+1))} (${(s.score||0).toFixed(1)})</span>`).join('') +
        '</div>';
    }
    el.innerHTML = `<div class="msg-avatar">🤖</div><div><div class="msg-bubble">${renderMarkdown(text)}</div>${srcs}</div>`;
  }
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'end'});
}

function appendTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'end'});
  return el;
}

// ===== Doc Management =====
async function deleteDoc(docId) {
  if (!confirm('确定删除这篇文档吗？')) return;
  try {
    await fetch(`/api/admin/document/${docId}`, {method:'DELETE'});
    closePreview();
    loadSidebar();
  } catch(e) { alert('删除失败'); }
}

function deleteCurrentDoc() {
  if (currentDocId) deleteDoc(currentDocId);
}

function startEdit() {
  if (!currentDocData) return;
  const doc = currentDocData;
  document.getElementById('dpBody').innerHTML = `
    <div style="font-weight:600;color:var(--text-muted);margin-bottom:6px;">标题</div>
    <input class="edit-field" id="editTitle" value="${esc(doc.title)}">
    <div style="font-weight:600;color:var(--text-muted);margin:12px 0 6px;">内容 (Markdown)</div>
    <textarea class="edit-field edit-textarea" id="editContent">${esc(doc.content)}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="dp-btn" onclick="saveEdit()" style="background:var(--primary);color:#fff;border-color:var(--primary);">💾 保存</button>
      <button class="dp-btn" onclick="previewDoc('${doc.id}')">取消</button>
    </div>`;
}

async function saveEdit() {
  const title = document.getElementById('editTitle').value.trim();
  const content = document.getElementById('editContent').value;
  if (!title) { alert('标题不能为空'); return; }
  try {
    await fetch(`/api/admin/document/${currentDocId}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title, content}),
    });
    previewDoc(currentDocId);
    loadSidebar();
  } catch(e) { alert('保存失败'); }
}

// ===== Markdown =====
function renderMarkdown(text) {
  if (!text) return '';
  let html = esc(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  html = html.replace(/^(?!<[hupolb])(.+)$/gm, '<p>$1</p>');
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
